site_name: FluidNC-EspNow-Client
site_description: Build FluidNC ESP-NOW peripherals on ESP32 - pendants, DROs, macro pads, probes, and button panels.
site_url: https://figamore.github.io/FluidNC-EspNow-Client/
site_author: Figamore

repo_url: https://github.com/figamore/FluidNC-EspNow-Client
repo_name: figamore/FluidNC-EspNow-Client

copyright: Copyright &copy; Figamore

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Pairing & Machines: pairing.md
  - Events: events.md
  - Commands & Realtime: commands.md
  - Status Reports: status.md
  - Advanced & Limitations: advanced.md
